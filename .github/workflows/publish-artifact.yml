name: Publish existing artifact

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Workflow run ID containing the package artifact
        required: true
        type: string
      artifact_name:
        description: Artifact name to publish
        required: true
        type: string
        default: codex-desktop-x86_64

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-arch-repo-x86_64
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    environment: release
    steps:
      - name: Install publishing tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm github-cli gnupg

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download package artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.artifact_name }}
          path: dist
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.run_id }}

      - name: Create publishing user and import signing key
        env:
          REPO_GPG_PRIVATE_KEY: ${{ secrets.REPO_GPG_PRIVATE_KEY }}
        run: |
          useradd --create-home builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          install -d -m 700 -o builder -g builder /home/builder/.gnupg
          printf '%s' "$REPO_GPG_PRIVATE_KEY" | runuser -u builder -- gpg --batch --import

      - name: Publish package and repository database
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_GPG_KEY_ID: ${{ secrets.REPO_GPG_KEY_ID }}
        run: |
          package_file="$(find dist -maxdepth 1 -type f -name '*.pkg.tar.zst' | head -n 1)"
          test -n "$package_file"
          pacman -Qip "$package_file"
          runuser -u builder -- env \
            GH_TOKEN="$GH_TOKEN" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            REPO_GPG_KEY_ID="$REPO_GPG_KEY_ID" \
            bash "$GITHUB_WORKSPACE/scripts/publish-repo.sh" "$package_file"

